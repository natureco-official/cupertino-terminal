name: Build installers

# Sürüm etiketi (v1.2.3) push edilince Windows .exe + macOS .dmg derler ve
# aynı sürüm için bir GitHub Release oluşturup installer'ları ekler.
# Elle de tetiklenebilir (Actions sekmesi → Run workflow).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  rust-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build Tauri frontend assets
        run: npm ci && npm run frontend:build

      - name: Check Tauri Rust crate
        working-directory: src-tauri
        run: cargo check --target ${{ matrix.target }}

  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application
        run: npm run check && npm run smoke:native && npm run smoke:app && npm run perf:pty && npm audit --audit-level=high

  build:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: verify
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # electron-updater icin latest.yml + .blockmap da Release'e yuklenmeli
          - os: windows-latest
            command: npm run dist -- --publish never
            pattern: |
              dist/*.exe
              dist/latest.yml
              dist/*.blockmap
          - os: macos-15-intel
            command: npm run dist -- --mac --x64 --publish never
            pattern: |
              dist/*.dmg
          - os: macos-15
            command: npm run dist -- --mac --arm64 --publish never
            pattern: |
              dist/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # CI'de lavamoat yok → native prebuild + electron postinstall normal çalışır
      - name: Install dependencies
        run: npm ci

      - name: Verify JavaScript and native terminal modules
        run: npm run check && npm run smoke:native && npm run smoke:app && npm run perf:pty && npm audit --audit-level=high

      - name: Build installer (electron-builder)
        # --publish never: electron-builder yalnizca derlesin; yuklemeyi asagidaki
        # softprops adimi (Release'e ekleme) yapar.
        run: ${{ matrix.command }}
        env:
          # electron-builder'ın kod imzalamayı atlaması için (imzasız derleme)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Attach installer to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.pattern }}
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
